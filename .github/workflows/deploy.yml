name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: jarvis-build-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run tests
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config
      - name: Deploy image to k3s
        run: |
          kubectl -n jarvis set image deployment/bot-api bot-api=${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Verify bot-api rollout
        run: |
          kubectl -n jarvis rollout status deployment/bot-api
      - name: Run database migrations
        run: |
          kubectl -n jarvis exec deploy/bot-api -- npm run db:migrate
      - name: Sync Discord slash commands
        run: |
          kubectl -n jarvis exec deploy/bot-api -- npm run commands:sync
      - name: Deploy worker image to k3s
        run: |
          kubectl -n jarvis set image deployment/worker worker=${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Verify worker rollout
        run: |
          kubectl -n jarvis rollout status deployment/worker
      - name: Rollback on failed rollout
        if: failure()
        run: |
          kubectl -n jarvis rollout undo deployment/bot-api || true
          kubectl -n jarvis rollout undo deployment/worker || true
